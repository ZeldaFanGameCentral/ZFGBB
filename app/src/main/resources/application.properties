spring.application.name=zfgbb
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
spring.flyway.enabled=true
spring.flyway.schemas=zfgbb
spring.flyway.default-schema=zfgbb
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/setup,classpath:db/migration
spring.flyway.out-of-order=true

server.servlet.context-path=/zfgbb

zfgbb.auth.jwt.secret=${ZFGBB_AUTH_JWT_SECRET:dev-only-secret-replace-me-with-32-or-more-bytes-please}
zfgbb.auth.jwt.access-ttl-minutes=${ZFGBB_AUTH_JWT_ACCESS_TTL_MINUTES:15}
zfgbb.auth.refresh.ttl-days=${ZFGBB_AUTH_REFRESH_TTL_DAYS:30}
zfgbb.auth.refresh.session-ttl-hours=${ZFGBB_AUTH_REFRESH_SESSION_TTL_HOURS:8}

zfgbb.auth.lockout.failed-attempts=${ZFGBB_AUTH_LOCKOUT_FAILED_ATTEMPTS:10}
zfgbb.auth.lockout.duration-minutes=${ZFGBB_AUTH_LOCKOUT_DURATION_MINUTES:15}

# 0 for max-age-days = never expire
zfgbb.auth.password.max-age-days=${ZFGBB_AUTH_PASSWORD_MAX_AGE_DAYS:0}
zfgbb.install.token=${ZFGBB_INSTALL_TOKEN:}

zfgbb.auth.cookie.secure=${ZFGBB_AUTH_COOKIE_SECURE:false}

zfgbb.migrator.enabled=${ZFGBB_MIGRATOR_ENABLED:false}
zfgbb.registration.enabled=${ZFGBB_REGISTRATION_ENABLED:false}

zfgbb.cors.allowed-origin-patterns=${ZFGBB_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://zeldafangamecentral.github.io,https://zeldafangamecentral.github.io,http://*.zfgc.com,https://*.zfgc.com,http://zfgc.com,https://zfgc.com,http://zfgc.com:28080,https://zfgc.com:28080}

mbg.target-package.mapper=com.zfgc.zfgcbb.mappers
mbg.target-package.domain=com.zfgc.zfgcbb.dbo
mbg.target-project.java=src/main/java
mbg.target-project.resources=src/main/resources
