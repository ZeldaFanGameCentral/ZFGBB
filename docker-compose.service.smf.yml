name: zfgbb

x-smf-mysql-base: &smf-mysql-base
  image: mysql:8
  command:
    - --character-set-server=utf8mb3
    - --collation-server=utf8mb3_general_ci
    - --sql-mode=NO_ENGINE_SUBSTITUTION
  environment:
    MYSQL_ROOT_PASSWORD: ${SMF_ROOT_PASSWORD:-rootpw}
    MYSQL_DATABASE: ${SMF_DATABASE:-smf}
    MYSQL_USER: ${SMF_USER:-smf}
    MYSQL_PASSWORD: ${SMF_PASSWORD:-smfpw}
  networks:
    - zfgbb
  healthcheck:
    test:
      [
        "CMD",
        "mysqladmin",
        "ping",
        "-h",
        "localhost",
        "-u",
        "root",
        "-p${SMF_ROOT_PASSWORD:-rootpw}",
      ]
    interval: 2s
    timeout: 3s
    retries: 30
    start_period: 5s
  restart: unless-stopped

services:
  smf_mysql:
    profiles: [ live ]
    <<: *smf-mysql-base
    ports:
      - "${SMF_MYSQL_PORT:-3308}:3306"
    volumes:
      - smf_live_data:/var/lib/mysql

  smf_mysql_fixture:
    profiles: [ fixture ]
    <<: *smf-mysql-base
    ports:
      - "${SMF_FIXTURE_MYSQL_PORT:-3307}:3306"
    volumes:
      - smf_fixture_data:/var/lib/mysql
      - ./app/src/test/resources/smf-fixtures/2.0.15/smf-schema.sql:/docker-entrypoint-initdb.d/01-smf-schema.sql:ro
      - ./app/src/test/resources/smf-fixtures/2.0.15/smf-zfgc-deltas.sql:/docker-entrypoint-initdb.d/02-zfgc-deltas.sql:ro
      - ./app/src/test/resources/smf-fixtures/2.0.15/smf-data.sql:/docker-entrypoint-initdb.d/03-data.sql:ro
      - ./app/src/test/resources/smf-fixtures/2.0.15/smf-attachments:/smf-attachments:ro

  # PHP/Apache serving the unzipped SMF 2.0.15 source. Reach the installer at
  # http://localhost:${SMF_WEB_PORT:-8090}/install.php
  smf_web:
    profiles: [ live ]
    build:
      context: .
      dockerfile: Dockerfile.smf
    ports:
      - "${SMF_WEB_PORT:-8090}:8080"
    networks:
      - zfgbb
    depends_on:
      smf_mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  smf_live_data:
  smf_fixture_data:

networks:
  zfgbb:
    driver: bridge
