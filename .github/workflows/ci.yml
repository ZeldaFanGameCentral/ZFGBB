name: CI
on:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java-version}} for x64
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
          architecture: x64
          cache: maven
      - name: Build with Maven
        run: mvn clean compile package -Dmaven.test.skip=true

  dependabutt-check:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check if run is triggered by dependabot
        uses: ZFGCCP/github-common/actions/auto-approve-dependabot@main
